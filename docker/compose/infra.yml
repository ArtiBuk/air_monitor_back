services:
  postgres:
    image: postgres:17-alpine
    container_name: air-monitor-postgres
    hostname: air-monitor-postgres
    restart: unless-stopped
    shm_size: 256mb
    env_file:
      - ../env/db.env
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - air_monitor_network

  redis:
    image: redis:7-alpine
    container_name: air-monitor-redis
    hostname: air-monitor-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - air_monitor_network
